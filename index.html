<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Chapters</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .chapter {
            background-color: #fff;
            margin: 15px 0;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chapter.complete {
            background-color: #d4edda;
            text-decoration: line-through;
            color: #155724;
        }
        button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Management Chapters</h1>

    <div class="chapter">
        <span>Nature and Purpose of Management (8)</span>
        <button onclick="markComplete(this)">Mark as Complete</button>
    </div>

    <div class="chapter">
        <span>Principles of Management (9)</span>
        <button onclick="markComplete(this)">Mark as Complete</button>
    </div>

    <div class="chapter">
        <span>Business Environment (5)</span>
        <button onclick="markComplete(this)">Mark as Complete</button>
    </div>

    <div class="chapter">
        <span>Planning (8)</span>
        <button onclick="markComplete(this)">Mark as Complete</button>
    </div>

    <div class="chapter">
        <span>Organizing (9)</span>
        <button onclick="markComplete(this)">Mark as Complete</button>
    </div>

    <div class="chapter">
        <span>Staffing (12)</span>
        <button onclick="markComplete(this)">Mark as Complete</button>
    </div>

    <div class="chapter">
        <span>Directing (14)</span>
        <button onclick="markComplete(this)">Mark as Complete</button>
    </div>

    <div class="chapter">
        <span>Controlling (5)</span>
        <button onclick="markComplete(this)">Mark as Complete</button>
    </div>

    <div class="chapter">
        <span>Financial Management (13)</span>
        <button onclick="markComplete(this)">Mark as Complete</button>
    </div>

    <div class="chapter">
        <span>Marketing Management (16)</span>
        <button onclick="markComplete(this)">Mark as Complete</button>
    </div>

    <div class="chapter">
        <span>Consumer Protection Act (5)</span>
        <button onclick="markComplete(this)">Mark as Complete</button>
    </div>

    <script>
        function markComplete(button) {
            const chapterDiv = button.parentElement;
            chapterDiv.classList.toggle('complete');
            button.innerText = chapterDiv.classList.contains('complete') ? 'Completed' : 'Mark as Complete';
        }
    </script>
</body>
</html>
